<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trip App V10</title>

<style>
body { margin:0; font-family:system-ui; background:#f2f4f8; }

.page { display:none; padding:16px 16px 110px; }
.page.active { display:block; }

.card {
  background:white;
  border-radius:18px;
  padding:16px;
  margin-bottom:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.btn {
  background:#2d6cdf;
  color:white;
  padding:12px;
  border:none;
  border-radius:12px;
  width:100%;
  margin-top:10px;
}

.nav {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:12px;
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.8);
}

.tabs { display:flex; overflow:auto; }

.tab {
  padding:8px 12px;
  margin-right:6px;
  background:#e0e6f5;
  border-radius:20px;
}

.tab.active { background:#2d6cdf; color:white; }

.day-item {
  background:#eef3ff;
  padding:10px;
  border-radius:10px;
  margin-top:6px;
  display:flex;
  justify-content:space-between;
}

#map { height:250px; border-radius:12px; margin-top:10px; }
</style>
</head>

<body>

<div id="auth" class="page active">
  <h2>Вход</h2>
  <button class="btn" onclick="login()">Google</button>
</div>

<div id="plans" class="page">
  <h2>🌍 Планы</h2>

  <button class="btn" onclick="loadPublic()">Публичные</button>
  <button class="btn" onclick="loadMy()">Мои</button>

  <div id="list"></div>

  <button class="btn" onclick="openPage('create')">➕ Создать</button>
</div>

<div id="create" class="page">
  <h2>Новый план</h2>
  <input id="title" placeholder="Название">
  <input id="start" type="date">
  <input id="end" type="date">
  <button class="btn" onclick="createPlan()">Создать</button>
</div>

<div id="view" class="page">
  <button onclick="openPage('plans')">⬅</button>

  <h2 id="planTitle"></h2>
  <div id="likes"></div>
  <button class="btn" onclick="likePlan()">❤️ Лайк</button>
  <button class="btn" onclick="savePlan()">💾 Сохранить</button>

  <div id="tabs"></div>
  <div id="dayContent"></div>
</div>

<div id="profile" class="page">
  <button onclick="openPage('plans')">⬅</button>
  <h2>Профиль</h2>
  <div id="myPlans"></div>
</div>

<div class="nav">
  <button onclick="openPage('plans')">📋</button>
  <button onclick="openProfile()">👤</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore, collection, addDoc, doc, updateDoc, getDoc, query, where, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyD...",
  authDomain: "travel-constructor-plan.firebaseapp.com",
  projectId: "travel-constructor-plan"
};

const MAPS_KEY = "AIzaSyAtUfcAm2wKMTsfEf4zxF86yrBz20Fu8pw";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user, currentPlan, currentPlanId, currentDayIndex=0;

/* AUTH */
window.login = async ()=>{
  await signInWithPopup(auth, new GoogleAuthProvider());
};

onAuthStateChanged(auth, u=>{
  if(u){ user=u; openPage("plans"); loadPublic(); }
});

/* NAV */
window.openPage = (id)=>{
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
};

/* CREATE */
window.createPlan = async ()=>{
  const days=[];
  let d=new Date(start.value);

  while(d<=new Date(end.value)){
    days.push({date:d.toISOString().slice(0,10), items:[]});
    d.setDate(d.getDate()+1);
  }

  await addDoc(collection(db,"plans"), {
    userId:user.uid,
    title:title.value,
    start:start.value,
    end:end.value,
    public:false,
    likes:0,
    days
  });

  openPage("plans");
};

/* LOAD */
window.loadPublic = ()=>{
  onSnapshot(query(collection(db,"plans"), where("public","==",true)), render);
};

window.loadMy = ()=>{
  onSnapshot(query(collection(db,"plans"), where("userId","==",user.uid)), render);
};

function render(snap){
  list.innerHTML="";
  snap.forEach(d=>{
    const p=d.data();
    list.innerHTML+=`
      <div class="card">
        <b>${p.title}</b>
        <div>❤️ ${p.likes||0}</div>
        <button class="btn" onclick="openPlan('${d.id}')">Открыть</button>
      </div>
    `;
  });
}

/* OPEN */
window.openPlan = async (id)=>{
  currentPlanId=id;
  currentPlan=(await getDoc(doc(db,"plans",id))).data();

  planTitle.innerText=currentPlan.title;
  likes.innerText="❤️ "+(currentPlan.likes||0);

  renderTabs();
  openPage("view");
};

/* LIKE */
window.likePlan = async ()=>{
  const key="liked_"+currentPlanId;

  if(localStorage.getItem(key)) return alert("Уже лайкал");

  await updateDoc(doc(db,"plans",currentPlanId), {
    likes:(currentPlan.likes||0)+1
  });

  localStorage.setItem(key,true);
  openPlan(currentPlanId);
};

/* SAVE */
window.savePlan = async ()=>{
  await addDoc(collection(db,"plans"), {
    ...currentPlan,
    userId:user.uid,
    public:false
  });

  alert("Сохранено");
};

/* PROFILE */
window.openProfile = ()=>{
  openPage("profile");

  onSnapshot(query(collection(db,"plans"), where("userId","==",user.uid)), snap=>{
    myPlans.innerHTML="";
    snap.forEach(d=>{
      myPlans.innerHTML+=`<div class="card">${d.data().title}</div>`;
    });
  });
};

/* TABS */
function renderTabs(){
  tabs.className="tabs";
  tabs.innerHTML="";

  currentPlan.days.forEach((d,i)=>{
    tabs.innerHTML+=`<div class="tab" onclick="openDay(${i})">${d.date.slice(5)}</div>`;
  });

  openDay(0);
}

/* DAY */
window.openDay = (i)=>{
  currentDayIndex=i;
  const d=currentPlan.days[i];

  dayContent.innerHTML=`
    <div class="card">
      <b>${d.date}</b>

      ${d.items.map((it,idx)=>`
        <div class="day-item">
          ${it}
          <button onclick="removeItem(${idx})">❌</button>
        </div>
      `).join("")}

      <input id="newItem">
      <button class="btn" onclick="addItem()">Добавить</button>

      <div id="map"></div>
    </div>
  `;

  loadMap(d.items);
};

/* ADD */
window.addItem = async ()=>{
  currentPlan.days[currentDayIndex].items.push(newItem.value);

  await updateDoc(doc(db,"plans",currentPlanId), {
    days: currentPlan.days
  });

  openDay(currentDayIndex);
};

/* REMOVE */
window.removeItem = async (i)=>{
  currentPlan.days[currentDayIndex].items.splice(i,1);

  await updateDoc(doc(db,"plans",currentPlanId), {
    days: currentPlan.days
  });

  openDay(currentDayIndex);
};

/* MAP */
function loadMap(places){
  const script=document.createElement("script");
  script.src=`https://maps.googleapis.com/maps/api/js?key=${MAPS_KEY}&callback=initMap`;
  script.async=true;

  window.initMap=()=>{
    const map=new google.maps.Map(document.getElementById("map"), {
      zoom:4,
      center:{lat:35.6,lng:139.6}
    });

    const geocoder=new google.maps.Geocoder();

    places.forEach((p,i)=>{
      geocoder.geocode({address:p}, (res,status)=>{
        if(status==="OK"){
          new google.maps.Marker({
            position:res[0].geometry.location,
            label:(i+1)+"",
            map
          });
        }
      });
    });
  };

  document.body.appendChild(script);
}

</script>

</body>
</html>
